      vendor: "constructorfabric"
      priority: 100
      model_catalog:
        - id: "gpt-oss-120b"
          provider_model_id: "h200/gpt-oss-120b"
          display_name: "GPT-OSS 120B"
          description: "120B open-source model on H200 GPU"
          provider_id: "vllm"
          provider_display_name: "Local vLLM"
          icon: ""
          tier: Standard
          enabled: true
          system_prompt: "You are a helpful, concise assistant."
          thread_summary_prompt: ""
          multimodal_capabilities: ["VISION_INPUT"]
          context_window: 32768
          max_output_tokens: 4096
          max_input_tokens: 28672
          input_tokens_credit_multiplier_micro: 1000000
          output_tokens_credit_multiplier_micro: 1000000
          multiplier_display: "1x"
          estimation_budgets:
            bytes_per_token_conservative: 4
            fixed_overhead_tokens: 100
            safety_margin_pct: 10
            image_token_budget: 1000
            tool_surcharge_tokens: 500
            web_search_surcharge_tokens: 500
            code_interpreter_surcharge_tokens: 1000
            minimal_generation_floor: 50
          max_num_results: 5
          web_search_context_size: low
          max_tool_calls: 10
          general_config:
            type: ""
