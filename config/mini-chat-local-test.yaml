      # Single-tenant: every logged-in user is mapped to this tenant.
      default_tenant_id: "00000000-0000-0000-0000-000000000001"
      # Scopes granted to every authenticated user (single-tenant dev stand).
      default_scopes: ["*"]
      group_scopes: {}

      # Service-to-service credentials for internal gears (mini-chat S2S).
      s2s_credentials:
        - client_id: "mini-chat"
          client_secret: "mini-chat-s2s-secret"

      cookie_name: "cf_session"
      cookie_secure: false
      post_login_redirect: "/"

      oidc:
        # Reached identically by the browser (via /etc/hosts) and the backend
        # (via the docker network alias) — see deploy/passport-stand/README.md.
        issuer_url: "http://auth.local:8080/default"
        client_id: "cyberchat"
        client_secret: "secret"
        redirect_uri: "http://cyberchat.adc.corp.acronis.com/auth/callback"
        scopes: ["openid", "profile", "email"]

